<!doctype html>
<html lang="ml">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Articles | Sulthaniya Foundation</title>
    <meta name="description" content="All articles and posts from Sulthaniya Foundation.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Anek+Malayalam:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    >
    <link rel="stylesheet" href="styles.css">
  </head>
  <body data-page="articles">
    <header class="site-header">
      <a class="brand" href="index.html#home" aria-label="Sulthaniya Foundation home">
        <span class="brand-mark">
          <img class="brand-logo" data-logo-image alt="" hidden>
          <span data-logo-initials>SF</span>
        </span>
        <span>
          <strong data-edit="siteTitle">Sulthaniya Foundation</strong>
          <small data-edit="siteTagline">Divine love and wisdom</small>
        </span>
      </a>

      <button class="nav-toggle" type="button" aria-label="Open menu" aria-expanded="false">
        <span></span>
        <span></span>
      </button>

      <nav class="main-nav" aria-label="Main navigation"></nav>
    </header>

    <main>
      <section class="articles-page" aria-label="All posts">
        <div class="post-page-heading">
          <div>
            <div class="section-kicker">Articles</div>
            <h1>All posts</h1>
          </div>
          <div class="filters" id="articlesFilters" aria-label="Filter posts"></div>
        </div>

        <div class="article-grid" id="articlesGrid" aria-label="All posts"></div>
      </section>
    </main>

    <footer class="site-footer">
      <div>
        <strong data-edit="siteTitle">Sulthaniya Foundation</strong>
        <p data-edit="siteTagline">Divine love and wisdom</p>
      </div>
      <div class="footer-links"></div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
