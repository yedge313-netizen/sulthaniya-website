backend:
  name: github
  repo: yedge313-netizen/sulthaniya-website
  branch: main
  base_url: https://sveltia-cms-auth.yedge313.workers.dev

local_backend: true

media_folder: "uploads"
public_folder: "uploads"

collections:
  - name: "website"
    label: "Website"
    files:
      - name: "site"
        label: "Site Logo & Text"
        file: "data/site.json"
        format: "json"
        fields:
          - { label: "Website Name", name: "siteTitle", widget: "string" }
          - { label: "Tagline", name: "siteTagline", widget: "string", required: false }
          - { label: "Logo Initials", name: "logoInitials", widget: "string", default: "SF", required: false }
          - { label: "Logo Image", name: "logoImage", widget: "image", required: false, hint: "Upload an image here to replace the round SF mark." }
          - { label: "Logo Alt Text", name: "logoAlt", widget: "string", required: false }
          - { label: "Desktop Hero Image", name: "heroDesktopImage", widget: "image", required: false, hint: "Wide image for laptop and desktop screens." }
          - { label: "Mobile Hero Image", name: "heroMobileImage", widget: "image", required: false, hint: "Portrait or tightly cropped image for phones." }
          - { label: "Hero Headline", name: "heroTitle", widget: "text" }
          - { label: "Hero Description", name: "heroText", widget: "text" }
      - name: "navigation"
        label: "Navigation Tabs"
        file: "data/navigation.json"
        format: "json"
        fields:
          - label: "Tabs"
            name: "tabs"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "Tab Name", name: "label", widget: "string" }
              - { label: "Link", name: "url", widget: "string", required: false, hint: "Use section links like #articles, full links like https://example.com, or leave empty for a dropdown parent." }
              - label: "Style"
                name: "style"
                widget: "select"
                default: "normal"
                options:
                  - { label: "Normal Tab", value: "normal" }
                  - { label: "Button Tab", value: "button" }
              - { label: "Open in New Tab", name: "newTab", widget: "boolean", default: false, required: false }
              - label: "Dropdown Links"
                name: "items"
                widget: "list"
                required: false
                summary: "{{fields.label}}"
                hint: "Add links here when this tab should open as a dropdown."
                fields:
                  - { label: "Link Name", name: "label", widget: "string" }
                  - { label: "Link", name: "url", widget: "string" }
                  - label: "Style"
                    name: "style"
                    widget: "select"
                    default: "normal"
                    options:
                      - { label: "Normal Link", value: "normal" }
                      - { label: "Button Link", value: "button" }
                  - { label: "Open in New Tab", name: "newTab", widget: "boolean", default: false, required: false }
      - name: "quick_links"
        label: "Green Quick Tabs"
        file: "data/quick-links.json"
        format: "json"
        fields:
          - label: "Tabs"
            name: "links"
            widget: "list"
            summary: "{{fields.number}} - {{fields.title}}"
            fields:
              - { label: "Number", name: "number", widget: "string", hint: "Example: 01, 02, 03", required: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Link", name: "url", widget: "string", hint: "Use section links like #articles or full links like https://example.com" }
              - { label: "Open in New Tab", name: "newTab", widget: "boolean", default: false, required: false }
      - name: "learning_paths"
        label: "Learning Categories"
        file: "data/learning-paths.json"
        format: "json"
        fields:
          - { label: "Small Heading", name: "sectionKicker", widget: "string", required: false }
          - { label: "Section Title", name: "sectionTitle", widget: "string" }
          - { label: "Top Link Label", name: "sectionLinkLabel", widget: "string", required: false }
          - { label: "Top Link URL", name: "sectionLinkUrl", widget: "string", required: false }
          - { label: "Open Top Link in New Tab", name: "sectionLinkNewTab", widget: "boolean", default: true, required: false }
          - label: "Category Cards"
            name: "paths"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Link", name: "url", widget: "string" }
              - { label: "Open in New Tab", name: "newTab", widget: "boolean", default: true, required: false }
      - name: "masters_actions"
        label: "Masters Section Buttons"
        file: "data/masters-actions.json"
        format: "json"
        fields:
          - { label: "Section Photo (left side tree image)", name: "sectionImage", widget: "image", required: false, hint: "Upload the large photo shown on the left of the Masters / Gurunathar section." }
          - { label: "Button 1 Text", name: "buttonOneLabel", widget: "string" }
          - { label: "Button 1 Link", name: "buttonOneUrl", widget: "string" }
          - { label: "Button 1 Open in New Tab", name: "buttonOneNewTab", widget: "boolean", default: false, required: false }
          - { label: "Button 2 Text", name: "buttonTwoLabel", widget: "string" }
          - { label: "Button 2 Link", name: "buttonTwoUrl", widget: "string" }
          - { label: "Button 2 Open in New Tab", name: "buttonTwoNewTab", widget: "boolean", default: false, required: false }
          - { label: "Button 3 Text", name: "buttonThreeLabel", widget: "string" }
          - { label: "Button 3 Link", name: "buttonThreeUrl", widget: "string" }
          - { label: "Button 3 Open in New Tab", name: "buttonThreeNewTab", widget: "boolean", default: false, required: false }
      - name: "social_links"
        label: "Social Links"
        file: "data/social-links.json"
        format: "json"
        fields:
          - { label: "Instagram Link", name: "instagramUrl", widget: "string", required: false }
          - { label: "Facebook Link", name: "facebookUrl", widget: "string", required: false }
          - { label: "YouTube Link", name: "youtubeUrl", widget: "string", required: false }

  - name: "content"
    label: "Content"
    files:
      - name: "usthad_posts"
        label: "Usthad Page Posts"
        file: "data/usthad-posts.json"
        format: "json"
        fields:
          - { label: "Small Heading", name: "pageKicker", widget: "string", required: false }
          - { label: "Page Title", name: "pageTitle", widget: "string" }
          - { label: "Intro Text", name: "pageIntro", widget: "text", required: false }
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Card Title", name: "title", widget: "string", hint: "Title on the Usthad posts grid (card preview)." }
              - { label: "Category Label", name: "categoryLabel", widget: "string", required: false }
              - { label: "Card Image", name: "image", widget: "image", required: false }
              - { label: "Card Summary", name: "summary", widget: "text", hint: "Short preview text on the card." }
              - { label: "Page URL Slug", name: "slug", widget: "string", required: false, hint: "Example: madina-historic-centers. Required for Read More link." }
              - { label: "Expand Read More editor", name: "expandReadMore", widget: "boolean", default: false, hint: "Turn on to show the Read More fields below. Turn off to collapse/hide them." }
              - label: "Read More Page (full article)"
                name: "readMore"
                widget: "object"
                collapsed: false
                summary: "{{fields.heading}}"
                condition:
                  field: expandReadMore
                  value: true
                fields:
                  - { label: "Enable Read More Page", name: "enabled", widget: "boolean", default: false }
                  - { label: "Heading", name: "heading", widget: "string", hint: "Large title on the Read More page (below header)." }
                  - { label: "Quote Under Photo", name: "quote", widget: "text", required: false }
                  - { label: "Quote Source", name: "quoteSource", widget: "string", required: false }
                  - label: "Content Paragraphs (below quote)"
                    name: "body"
                    widget: "list"
                    summary: "{{fields.paragraph}}"
                    required: false
                    field:
                      label: Paragraph
                      name: paragraph
                      widget: text
      - name: "mahal_posts"
        label: "Mahal Page Posts"
        file: "data/mahal-posts.json"
        format: "json"
        fields:
          - { label: "Small Heading", name: "pageKicker", widget: "string", required: false }
          - { label: "Page Title", name: "pageTitle", widget: "string" }
          - { label: "Intro Text", name: "pageIntro", widget: "text", required: false }
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category Label", name: "categoryLabel", widget: "string", required: false }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Short Summary", name: "summary", widget: "text" }
              - { label: "Read More Page Slug", name: "slug", widget: "string", required: false, hint: "Example: madina-historic-centers. Must match a file in data/post-details/." }
      - name: "silsila_posts"
        label: "Silsila Page Posts"
        file: "data/silsila-posts.json"
        format: "json"
        fields:
          - { label: "Small Heading", name: "pageKicker", widget: "string", required: false }
          - { label: "Page Title", name: "pageTitle", widget: "string" }
          - { label: "Intro Text", name: "pageIntro", widget: "text", required: false }
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Category Label", name: "categoryLabel", widget: "string", required: false }
              - { label: "Image", name: "image", widget: "image", required: false }
              - { label: "Short Summary", name: "summary", widget: "text" }
              - { label: "Read More Page Slug", name: "slug", widget: "string", required: false, hint: "Example: madina-historic-centers. Must match a file in data/post-details/." }
      - name: "posts"
        label: "Posts"
        file: "data/posts.json"
        format: "json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "Updates", value: "updates" }
                  - { label: "അധ്യാപനങ്ങൾ", value: "teaching" }
                  - { label: "റമളാൻ", value: "ramadan" }
              - label: "Category Label"
                name: "categoryLabel"
                widget: "select"
                options:
                  - "Updates"
                  - "അധ്യാപനങ്ങൾ"
                  - "റമളാൻ"
              - { label: "Featured Image", name: "image", widget: "image", required: false }
              - { label: "Short Summary", name: "summary", widget: "text" }
              - { label: "Original Link", name: "link", widget: "string", required: false }
