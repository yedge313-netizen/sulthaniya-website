backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "uploads"
public_folder: "/uploads"

collections:
  - name: "website"
    label: "Website"
    files:
      - name: "site"
        label: "Homepage Text"
        file: "data/site.json"
        format: "json"
        fields:
          - { label: "Website Name", name: "siteTitle", widget: "string" }
          - { label: "Small Tagline", name: "siteTagline", widget: "string" }
          - { label: "Hero Headline", name: "heroTitle", widget: "text" }
          - { label: "Hero Description", name: "heroText", widget: "text" }

  - name: "content"
    label: "Content"
    files:
      - name: "posts"
        label: "Posts"
        file: "data/posts.json"
        format: "json"
        fields:
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - label: "Category"
                name: "category"
                widget: "select"
                options:
                  - { label: "Updates", value: "updates" }
                  - { label: "അധ്യാപനങ്ങൾ", value: "teaching" }
                  - { label: "റമളാൻ", value: "ramadan" }
              - label: "Category Label"
                name: "categoryLabel"
                widget: "select"
                options:
                  - "Updates"
                  - "അധ്യാപനങ്ങൾ"
                  - "റമളാൻ"
              - { label: "Featured Image", name: "image", widget: "image", required: false }
              - { label: "Short Summary", name: "summary", widget: "text" }
              - { label: "Original Link", name: "link", widget: "string", required: false }
