backend:
  name: github
  repo: yedge313-netizen/sulthaniya-website
  branch: main
  base_url: https://sveltia-cms-auth.yedge313.workers.dev

local_backend: true

media_folder: "uploads"
public_folder: "uploads"

collections:
  - name: "website"
    label: "Website"
    files:
      - name: "site"
        label: "Site Logo & Text"
        file: "data/site.json"
        format: "json"
        fields:
          - { label: "Website Name", name: "siteTitle", widget: "string" }
          - { label: "Tagline", name: "siteTagline", widget: "string", required: false }
          - { label: "Logo Initials", name: "logoInitials", widget: "string", default: "SF", required: false }
          - { label: "Logo Image", name: "logoImage", widget: "image", required: false, hint: "Upload an image here to replace the round SF mark." }
          - { label: "Logo Alt Text", name: "logoAlt", widget: "string", required: false }
          - { label: "Desktop Hero Image", name: "heroDesktopImage", widget: "image", required: false, hint: "Wide image for laptop and desktop screens." }
          - { label: "Mobile Hero Image", name: "heroMobileImage", widget: "image", required: false, hint: "Portrait or tightly cropped image for phones." }
          - { label: "Hero Headline", name: "heroTitle", widget: "text" }
          - { label: "Hero Description", name: "heroText", widget: "text" }
      - name: "typography"
        label: "Font Sizes"
        file: "data/typography.json"
        format: "json"
        fields:
          - { label: "Main Heading (px)", name: "heroMainHeadingPx", widget: "string", required: false, default: "50", hint: "Large bold title on the homepage hero (mosque banner)." }
          - { label: "Sub-text (px)", name: "heroSubTextPx", widget: "string", required: false, default: "19", hint: "Smaller line under the main heading on the hero." }
          - { label: "Learning Section — Small Heading (px)", name: "learningKickerPx", widget: "string", required: false, default: "12" }
          - { label: "Learning Section — Big Title (px)", name: "learningTitlePx", widget: "string", required: false, default: "50" }
          - { label: "Learning Category Cards — Text (px)", name: "pathCardTextPx", widget: "string", required: false, default: "18" }
          - { label: "About Section — Small Heading (px)", name: "introKickerPx", widget: "string", required: false, default: "12" }
          - { label: "About Section — Main Heading (px)", name: "introHeadingPx", widget: "string", required: false, default: "56" }
          - { label: "About Section — Body Text (px)", name: "introBodyPx", widget: "string", required: false, default: "18" }
          - { label: "Quote Box — Text (px)", name: "quoteTextPx", widget: "string", required: false, default: "21" }
          - { label: "Quote Box — Source (px)", name: "quoteSourcePx", widget: "string", required: false, default: "12" }
          - { label: "Masters Section — Small Heading (px)", name: "mastersKickerPx", widget: "string", required: false, default: "12" }
          - { label: "Masters Section — Big Title (px)", name: "mastersTitlePx", widget: "string", required: false, default: "56" }
          - { label: "Masters Section — Body (px)", name: "mastersBodyPx", widget: "string", required: false, default: "18" }
      - name: "about_section"
        label: "About Section (Intro + Quote)"
        file: "data/about-section.json"
        format: "json"
        fields:
          - { label: "Small Heading", name: "sectionKicker", widget: "string", required: false }
          - { label: "Main Heading", name: "heading", widget: "string" }
          - label: "Paragraphs (left column)"
            name: "paragraphs"
            widget: "list"
            summary: "{{fields.paragraph}}"
            field:
              label: Paragraph
              name: paragraph
              widget: text
          - { label: "Quote Box Text", name: "quoteText", widget: "text" }
          - { label: "Quote Source", name: "quoteSource", widget: "string", required: false }
      - name: "navigation"
        label: "Navigation Tabs"
        file: "data/navigation.json"
        format: "json"
        fields:
          - label: "Tabs"
            name: "tabs"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "Tab Name", name: "label", widget: "string" }
              - { label: "Link", name: "url", widget: "string", required: false, hint: "Use section links like #articles, full links like https://example.com, or leave empty for a dropdown parent." }
              - label: "Style"
                name: "style"
                widget: "select"
                default: "normal"
                options:
                  - { label: "Normal Tab", value: "normal" }
                  - { label: "Button Tab", value: "button" }
              - { label: "Open in New Tab", name: "newTab", widget: "boolean", default: false, required: false }
              - label: "Dropdown Links"
                name: "items"
                widget: "list"
                required: false
                summary: "{{fields.label}}"
                hint: "Add links here when this tab should open as a dropdown."
                fields:
                  - { label: "Link Name", name: "label", widget: "string" }
                  - { label: "Link", name: "url", widget: "string" }
                  - label: "Style"
                    name: "style"
                    widget: "select"
                    default: "normal"
                    options:
                      - { label: "Normal Link", value: "normal" }
                      - { label: "Button Link", value: "button" }
                  - { label: "Open in New Tab", name: "newTab", widget: "boolean", default: false, required: false }
      - name: "quick_links"
        label: "Green Quick Tabs"
        file: "data/quick-links.json"
        format: "json"
        fields:
          - label: "Tabs"
            name: "links"
            widget: "list"
            summary: "{{fields.number}} - {{fields.title}}"
            fields:
              - { label: "Number", name: "number", widget: "string", hint: "Example: 01, 02, 03", required: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Link", name: "url", widget: "string", hint: "Use section links like #articles or full links like https://example.com" }
              - { label: "Open in New Tab", name: "newTab", widget: "boolean", default: false, required: false }
      - name: "learning_paths"
        label: "Learning Categories"
        file: "data/learning-paths.json"
        format: "json"
        fields:
          - { label: "Small Heading", name: "sectionKicker", widget: "string", required: false }
          - { label: "Section Title", name: "sectionTitle", widget: "string" }
          - label: "Category Cards"
            name: "paths"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Topic Slug", name: "slug", widget: "string", hint: "Example: quran opens learning.html?topic=quran. Use quran, hadith, kalima, tasawwuf, padanangal, history, sufi-stories, or videos." }
      - name: "masters_actions"
        label: "Masters Section"
        file: "data/masters-actions.json"
        format: "json"
        fields:
          - { label: "Section Photo (left side tree image)", name: "sectionImage", widget: "image", required: false, hint: "Upload the large photo shown on the left of the Masters / Gurunathar section." }
          - { label: "Small Heading", name: "sectionKicker", widget: "string", required: false }
          - { label: "Section Title", name: "sectionTitle", widget: "string" }
          - { label: "Body Text", name: "sectionBody", widget: "text" }
          - { label: "Button 1 Text", name: "buttonOneLabel", widget: "string" }
          - { label: "Button 1 Link", name: "buttonOneUrl", widget: "string" }
          - { label: "Button 1 Open in New Tab", name: "buttonOneNewTab", widget: "boolean", default: false, required: false }
          - { label: "Button 2 Text", name: "buttonTwoLabel", widget: "string" }
          - { label: "Button 2 Link", name: "buttonTwoUrl", widget: "string" }
          - { label: "Button 2 Open in New Tab", name: "buttonTwoNewTab", widget: "boolean", default: false, required: false }
          - { label: "Button 3 Text", name: "buttonThreeLabel", widget: "string" }
          - { label: "Button 3 Link", name: "buttonThreeUrl", widget: "string" }
          - { label: "Button 3 Open in New Tab", name: "buttonThreeNewTab", widget: "boolean", default: false, required: false }
      - name: "social_links"
        label: "Social Links"
        file: "data/social-links.json"
        format: "json"
        fields:
          - { label: "Instagram Link", name: "instagramUrl", widget: "string", required: false }
          - { label: "Facebook Link", name: "facebookUrl", widget: "string", required: false }
          - { label: "YouTube Link", name: "youtubeUrl", widget: "string", required: false }

  - name: "content"
    label: "Content"
    files:
      - name: "usthad_posts"
        label: "Usthad Page Posts"
        file: "data/usthad-posts.json"
        format: "json"
