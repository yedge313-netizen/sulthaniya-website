backend:
  name: github
  repo: yedge313-netizen/sulthaniya-website
  branch: main
  base_url: https://sveltia-cms-auth.yedge313.workers.dev

local_backend: true

media_folder: "uploads"
public_folder: "uploads"

collections:
  - name: "website"
    label: "Website"
    files:
      - name: "site"
        label: "Site Logo & Text"
        file: "data/site.json"
        format: "json"
        fields:
          - { label: "Website Name", name: "siteTitle", widget: "string" }
          - { label: "Tagline", name: "siteTagline", widget: "string", required: false }
          - { label: "Logo Initials", name: "logoInitials", widget: "string", default: "SF", required: false }
          - { label: "Logo Image - recommended 512 x 512 px", name: "logoImage", widget: "image", required: false, hint: "Square image. PNG with transparent background works best for the round logo." }
          - { label: "Logo Alt Text", name: "logoAlt", widget: "string", required: false }
          - { label: "Desktop Hero Image - recommended 1920 x 1080 px", name: "heroDesktopImage", widget: "image", required: false, hint: "Wide 16:9 image for laptop and desktop screens. Keep important text/people near the center." }
          - { label: "Mobile Hero Image - recommended 1080 x 1440 px", name: "heroMobileImage", widget: "image", required: false, hint: "Portrait 3:4 image for phones. Keep the main subject centered." }
          - { label: "Hero Headline", name: "heroTitle", widget: "text" }
          - { label: "Hero Description", name: "heroText", widget: "text" }
      - name: "site_en"
        label: "Home Page English Editor"
        file: "data/site-en.json"
        format: "json"
        fields:
          - { label: "Website Name (English)", name: "siteTitle", widget: "string", required: false }
          - { label: "Tagline (English)", name: "siteTagline", widget: "string", required: false }
          - { label: "Logo Alt Text (English)", name: "logoAlt", widget: "string", required: false }
          - { label: "Hero Headline (English)", name: "heroTitle", widget: "text", required: false }
          - { label: "Hero Description (English)", name: "heroText", widget: "text", required: false }
      - name: "typography"
        label: "Font Sizes"
        file: "data/typography.json"
        format: "json"
        fields:
          - { label: "Main Heading (px)", name: "heroMainHeadingPx", widget: "string", required: false, default: "50", hint: "Large bold title on the homepage hero (mosque banner)." }
          - { label: "Sub-text (px)", name: "heroSubTextPx", widget: "string", required: false, default: "19", hint: "Smaller line under the main heading on the hero." }
          - { label: "Learning Section — Small Heading (px)", name: "learningKickerPx", widget: "string", required: false, default: "12" }
          - { label: "Learning Section — Big Title (px)", name: "learningTitlePx", widget: "string", required: false, default: "50" }
          - { label: "Learning Category Cards — Text (px)", name: "pathCardTextPx", widget: "string", required: false, default: "18" }
          - { label: "About Section — Small Heading (px)", name: "introKickerPx", widget: "string", required: false, default: "12" }
          - { label: "About Section — Main Heading (px)", name: "introHeadingPx", widget: "string", required: false, default: "56" }
          - { label: "About Section — Body Text (px)", name: "introBodyPx", widget: "string", required: false, default: "18" }
          - { label: "Quote Box — Text (px)", name: "quoteTextPx", widget: "string", required: false, default: "21" }
          - { label: "Quote Box — Source (px)", name: "quoteSourcePx", widget: "string", required: false, default: "12" }
          - { label: "Masters Section — Small Heading (px)", name: "mastersKickerPx", widget: "string", required: false, default: "12" }
          - { label: "Masters Section — Big Title (px)", name: "mastersTitlePx", widget: "string", required: false, default: "56" }
          - { label: "Masters Section — Body (px)", name: "mastersBodyPx", widget: "string", required: false, default: "18" }
      - name: "about_section"
        label: "About Section (Intro + Quote)"
        file: "data/about-section.json"
        format: "json"
        fields:
          - { label: "Small Heading", name: "sectionKicker", widget: "string", required: false }
          - { label: "Main Heading", name: "heading", widget: "string" }
          - label: "Paragraphs (left column)"
            name: "paragraphs"
            widget: "list"
            summary: "{{fields.paragraph}}"
            field:
              label: Paragraph
              name: paragraph
              widget: markdown
          - { label: "Quote Box Text", name: "quoteText", widget: "text" }
          - { label: "Quote Source", name: "quoteSource", widget: "string", required: false }
      - name: "about_section_en"
        label: "About Section (English)"
        file: "data/about-section-en.json"
        format: "json"
        fields:
          - { label: "Small Heading (English)", name: "sectionKicker", widget: "string", required: false }
          - { label: "Main Heading (English)", name: "heading", widget: "string", required: false }
          - label: "Paragraphs (English)"
            name: "paragraphs"
            widget: "list"
            summary: "{{fields.paragraph}}"
            field:
              label: Paragraph
              name: paragraph
              widget: markdown
          - { label: "Quote Box Text (English)", name: "quoteText", widget: "text", required: false }
          - { label: "Quote Source (English)", name: "quoteSource", widget: "string", required: false }
      - name: "home_ui"
        label: "Home UI Labels (Malayalam)"
        file: "data/home-ui.json"
        format: "json"
        fields:
          - { label: "Top Eyebrow", name: "eyebrow", widget: "string", required: false }
          - { label: "Primary Button Text", name: "primaryCtaLabel", widget: "string", required: false }
          - { label: "Primary Button Link", name: "primaryCtaUrl", widget: "string", required: false }
          - { label: "Secondary Button Text", name: "secondaryCtaLabel", widget: "string", required: false }
          - { label: "Secondary Button Link", name: "secondaryCtaUrl", widget: "string", required: false }
          - { label: "Articles Small Heading", name: "articlesKicker", widget: "string", required: false }
          - { label: "Articles Title", name: "articlesTitle", widget: "string", required: false }
          - { label: "Filter: All", name: "filterAll", widget: "string", required: false }
          - { label: "Filter: Updates", name: "filterUpdates", widget: "string", required: false }
          - { label: "Filter: Teaching", name: "filterTeaching", widget: "string", required: false }
          - { label: "Filter: Ramadan", name: "filterRamadan", widget: "string", required: false }
          - { label: "Read More label", name: "readMoreLabel", widget: "string", required: false }
          - { label: "Back to label", name: "backToLabel", widget: "string", required: false }
      - name: "home_ui_en"
        label: "Home UI Labels (English)"
        file: "data/home-ui-en.json"
        format: "json"
        fields:
          - { label: "Top Eyebrow (English)", name: "eyebrow", widget: "string", required: false }
          - { label: "Primary Button Text (English)", name: "primaryCtaLabel", widget: "string", required: false }
          - { label: "Primary Button Link", name: "primaryCtaUrl", widget: "string", required: false }
          - { label: "Secondary Button Text (English)", name: "secondaryCtaLabel", widget: "string", required: false }
          - { label: "Secondary Button Link", name: "secondaryCtaUrl", widget: "string", required: false }
          - { label: "Articles Small Heading (English)", name: "articlesKicker", widget: "string", required: false }
          - { label: "Articles Title (English)", name: "articlesTitle", widget: "string", required: false }
          - { label: "Filter: All (English)", name: "filterAll", widget: "string", required: false }
          - { label: "Filter: Updates (English)", name: "filterUpdates", widget: "string", required: false }
          - { label: "Filter: Teaching (English)", name: "filterTeaching", widget: "string", required: false }
          - { label: "Filter: Ramadan (English)", name: "filterRamadan", widget: "string", required: false }
          - { label: "Read More label (English)", name: "readMoreLabel", widget: "string", required: false }
          - { label: "Back to label (English)", name: "backToLabel", widget: "string", required: false }
      - name: "navigation"
        label: "Navigation Tabs"
        file: "data/navigation.json"
        format: "json"
        fields:
          - label: "Tabs"
            name: "tabs"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "Tab Name", name: "label", widget: "string" }
              - { label: "Tab Name (English)", name: "labelEn", widget: "string", required: false }
              - { label: "Link", name: "url", widget: "string", required: false, hint: "Use section links like #articles, full links like https://example.com, or leave empty for a dropdown parent." }
              - label: "Style"
                name: "style"
                widget: "select"
                default: "normal"
                options:
                  - { label: "Normal Tab", value: "normal" }
                  - { label: "Button Tab", value: "button" }
              - { label: "Open in New Tab", name: "newTab", widget: "boolean", default: false, required: false }
              - label: "Dropdown Links"
                name: "items"
                widget: "list"
                required: false
                summary: "{{fields.label}}"
                hint: "Add links here when this tab should open as a dropdown."
                fields:
                  - { label: "Link Name", name: "label", widget: "string" }
                  - { label: "Link Name (English)", name: "labelEn", widget: "string", required: false }
                  - { label: "Link", name: "url", widget: "string" }
                  - label: "Style"
                    name: "style"
                    widget: "select"
                    default: "normal"
                    options:
                      - { label: "Normal Link", value: "normal" }
                      - { label: "Button Link", value: "button" }
                  - { label: "Open in New Tab", name: "newTab", widget: "boolean", default: false, required: false }
      - name: "footer_links"
        label: "Footer Links"
        file: "data/footer-links.json"
        format: "json"
        fields:
          - label: "Links"
            name: "links"
            widget: "list"
            summary: "{{fields.label}}"
            fields:
              - { label: "Link Text", name: "label", widget: "string" }
              - { label: "Link Text (English)", name: "labelEn", widget: "string", required: false }
              - { label: "Link URL", name: "url", widget: "string", hint: "Use #home, #sulthaniya, index.html#articles on subpages, or a full URL like https://..." }
              - label: "Style"
                name: "style"
                widget: "select"
                default: "normal"
                options:
                  - { label: "Normal Link", value: "normal" }
                  - { label: "Button (bordered)", value: "button" }
              - { label: "Open in New Tab", name: "newTab", widget: "boolean", default: false, required: false }
      - name: "quick_links"
        label: "Green Quick Tabs"
        file: "data/quick-links.json"
        format: "json"
        fields:
          - label: "Tabs"
            name: "links"
            widget: "list"
            summary: "{{fields.number}} - {{fields.title}}"
            fields:
              - { label: "Number", name: "number", widget: "string", hint: "Example: 01, 02, 03", required: false }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Title (English)", name: "titleEn", widget: "string", required: false }
              - { label: "Subtitle", name: "subtitle", widget: "string", required: false }
              - { label: "Subtitle (English)", name: "subtitleEn", widget: "string", required: false }
              - { label: "Link", name: "url", widget: "string", hint: "Use section links like #articles or full links like https://example.com" }
              - { label: "Open in New Tab", name: "newTab", widget: "boolean", default: false, required: false }
      - name: "learning_paths"
        label: "Learning Categories"
        file: "data/learning-paths.json"
        format: "json"
        fields:
          - { label: "Small Heading", name: "sectionKicker", widget: "string", required: false }
          - { label: "Small Heading (English)", name: "sectionKickerEn", widget: "string", required: false }
          - { label: "Section Title", name: "sectionTitle", widget: "string" }
          - { label: "Section Title (English)", name: "sectionTitleEn", widget: "string", required: false }
          - label: "Category Cards"
            name: "paths"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Title (English)", name: "titleEn", widget: "string", required: false }
              - { label: "Topic Slug", name: "slug", widget: "string", hint: "Example: quran opens quran.html. Use quran, hadith, kalima, tasawwuf, padanangal, history, sufi-stories, or videos." }
      - name: "masters_actions"
        label: "Masters Section"
        file: "data/masters-actions.json"
        format: "json"
        fields:
          - { label: "Section Photo - recommended 1000 x 1400 px", name: "sectionImage", widget: "image", required: false, hint: "Tall portrait image for the left side of the Masters / Gurunathar section." }
          - { label: "Small Heading", name: "sectionKicker", widget: "string", required: false }
          - { label: "Small Heading (English)", name: "sectionKickerEn", widget: "string", required: false }
          - { label: "Section Title", name: "sectionTitle", widget: "string" }
          - { label: "Section Title (English)", name: "sectionTitleEn", widget: "string", required: false }
          - { label: "Body Text", name: "sectionBody", widget: "markdown" }
          - { label: "Body Text (English)", name: "sectionBodyEn", widget: "markdown", required: false }
          - { label: "Button 1 Text", name: "buttonOneLabel", widget: "string" }
          - { label: "Button 1 Text (English)", name: "buttonOneLabelEn", widget: "string", required: false }
          - { label: "Button 1 Link", name: "buttonOneUrl", widget: "string" }
          - { label: "Button 1 Open in New Tab", name: "buttonOneNewTab", widget: "boolean", default: false, required: false }
          - { label: "Button 2 Text", name: "buttonTwoLabel", widget: "string" }
          - { label: "Button 2 Text (English)", name: "buttonTwoLabelEn", widget: "string", required: false }
          - { label: "Button 2 Link", name: "buttonTwoUrl", widget: "string" }
          - { label: "Button 2 Open in New Tab", name: "buttonTwoNewTab", widget: "boolean", default: false, required: false }
          - { label: "Button 3 Text", name: "buttonThreeLabel", widget: "string" }
          - { label: "Button 3 Text (English)", name: "buttonThreeLabelEn", widget: "string", required: false }
          - { label: "Button 3 Link", name: "buttonThreeUrl", widget: "string" }
          - { label: "Button 3 Open in New Tab", name: "buttonThreeNewTab", widget: "boolean", default: false, required: false }
      - name: "social_links"
        label: "Social Links"
        file: "data/social-links.json"
        format: "json"
        fields:
          - { label: "Instagram Link", name: "instagramUrl", widget: "string", required: false }
          - { label: "Facebook Link", name: "facebookUrl", widget: "string", required: false }
          - { label: "YouTube Link", name: "youtubeUrl", widget: "string", required: false }

  - name: "content"
    label: "Content"
    files:
      - name: "usthad_posts"
        label: "Usthad Page Posts"
        file: "data/usthad-posts.json"
        format: "json"
        fields:
          - { label: "Small Heading", name: "pageKicker", widget: "string", required: false }
          - { label: "Page Title", name: "pageTitle", widget: "string" }
          - { label: "Intro Text", name: "pageIntro", widget: "text", required: false }
          - { label: "Disable Read More pages", name: "readMoreDisabled", widget: "boolean", default: true, hint: "When on, Read More is off for all posts in this section. Turn off, then enable each post manually inside Read More Page." }
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Card Title", name: "title", widget: "string", hint: "Title on the Usthad posts grid (card preview)." }
              - { label: "Card Title (English)", name: "titleEn", widget: "string", required: false }
              - { label: "Category Label", name: "categoryLabel", widget: "string", required: false }
              - { label: "Category Label (English)", name: "categoryLabelEn", widget: "string", required: false }
              - { label: "Card Image - first post 900 x 1200 px; other posts 1200 x 800 px", name: "image", widget: "image", required: false, hint: "Use this exact ratio for best fit. First/featured post: 900 x 1200 px portrait. Other posts: 1200 x 800 px landscape. Images with different ratios will be cropped to keep cards level." }
              - { label: "Card Summary", name: "summary", widget: "text", hint: "Short preview text on the card." }
              - { label: "Card Summary (English)", name: "summaryEn", widget: "text", required: false }
              - { label: "Auto Page URL Slug", name: "slug", widget: "hidden", required: false }
              - label: "Enable Read More Page"
                name: "readMoreEnabled"
                widget: "boolean"
                default: false
                required: false
                condition:
                  field: readMoreDisabled
                  value: false
              - label: "Read More Page (full article) — click header to expand/collapse"
                name: "readMore"
                widget: "object"
                collapsed: true
                summary: "{{fields.heading}}"
                required: false
                condition:
                  - field: readMoreDisabled
                    value: false
                  - field: readMoreEnabled
                    value: true
                fields:
                  - { label: "Heading", name: "heading", widget: "string", required: false, hint: "Large title on the Read More page (below header)." }
                  - { label: "Heading Font Size (px)", name: "headingPx", widget: "string", required: false, hint: "Example: 58" }
                  - { label: "Heading (English)", name: "headingEn", widget: "string", required: false }
                  - { label: "Heading Font Size (px) (English)", name: "headingPxEn", widget: "string", required: false, hint: "Example: 58" }
                  - { label: "Quote Under Photo", name: "quote", widget: "text", required: false }
                  - { label: "Quote Under Photo (English)", name: "quoteEn", widget: "text", required: false }
                  - { label: "Quote Source", name: "quoteSource", widget: "string", required: false }
                  - { label: "Quote Source (English)", name: "quoteSourceEn", widget: "string", required: false }
                  - label: "Content Paragraphs (below quote)"
                    name: "body"
                    widget: "list"
                    summary: "{{fields.paragraph}}"
                    required: false
                    field:
                      label: Paragraph
                      name: paragraph
                      widget: markdown
                  - label: "Content Paragraphs (English)"
                    name: "bodyEn"
                    widget: "list"
                    summary: "{{fields.paragraph}}"
                    required: false
                    field:
                      label: Paragraph
                      name: paragraph
                      widget: markdown
      - name: "mahal_posts"
        label: "Mahal Page Posts"
        file: "data/mahal-posts.json"
        format: "json"
        fields:
          - { label: "Small Heading", name: "pageKicker", widget: "string", required: false }
          - { label: "Page Title", name: "pageTitle", widget: "string" }
          - { label: "Intro Text", name: "pageIntro", widget: "text", required: false }
          - { label: "Disable Read More pages", name: "readMoreDisabled", widget: "boolean", default: true, hint: "When on, Read More is off for all posts in this section. Turn off, then enable each post manually inside Read More Page." }
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Card Title", name: "title", widget: "string", hint: "Title on the Mahal posts grid (card preview)." }
              - { label: "Card Title (English)", name: "titleEn", widget: "string", required: false }
              - { label: "Category Label", name: "categoryLabel", widget: "string", required: false }
              - { label: "Category Label (English)", name: "categoryLabelEn", widget: "string", required: false }
              - { label: "Card Image - first post 900 x 1200 px; other posts 1200 x 800 px", name: "image", widget: "image", required: false, hint: "Use this exact ratio for best fit. First/featured post: 900 x 1200 px portrait. Other posts: 1200 x 800 px landscape. Images with different ratios will be cropped to keep cards level." }
              - { label: "Card Summary", name: "summary", widget: "text", hint: "Short preview text on the card." }
              - { label: "Card Summary (English)", name: "summaryEn", widget: "text", required: false }
              - { label: "Auto Page URL Slug", name: "slug", widget: "hidden", required: false }
              - label: "Enable Read More Page"
                name: "readMoreEnabled"
                widget: "boolean"
                default: false
                required: false
                condition:
                  field: readMoreDisabled
                  value: false
              - label: "Read More Page (full article) — click header to expand/collapse"
                name: "readMore"
                widget: "object"
                collapsed: true
                summary: "{{fields.heading}}"
                required: false
                condition:
                  - field: readMoreDisabled
                    value: false
                  - field: readMoreEnabled
                    value: true
                fields:
                  - { label: "Heading", name: "heading", widget: "string", required: false, hint: "Large title on the Read More page (below header)." }
                  - { label: "Heading Font Size (px)", name: "headingPx", widget: "string", required: false, hint: "Example: 58" }
                  - { label: "Heading (English)", name: "headingEn", widget: "string", required: false }
                  - { label: "Heading Font Size (px) (English)", name: "headingPxEn", widget: "string", required: false, hint: "Example: 58" }
                  - { label: "Quote Under Photo", name: "quote", widget: "text", required: false }
                  - { label: "Quote Under Photo (English)", name: "quoteEn", widget: "text", required: false }
                  - { label: "Quote Source", name: "quoteSource", widget: "string", required: false }
                  - { label: "Quote Source (English)", name: "quoteSourceEn", widget: "string", required: false }
                  - label: "Content Paragraphs (below quote)"
                    name: "body"
                    widget: "list"
                    summary: "{{fields.paragraph}}"
                    required: false
                    field:
                      label: Paragraph
                      name: paragraph
                      widget: markdown
                  - label: "Content Paragraphs (English)"
                    name: "bodyEn"
                    widget: "list"
                    summary: "{{fields.paragraph}}"
                    required: false
                    field:
                      label: Paragraph
                      name: paragraph
                      widget: markdown
      - name: "silsila_posts"
        label: "Silsila Page Posts"
        file: "data/silsila-posts.json"
        format: "json"
        fields:
          - { label: "Small Heading", name: "pageKicker", widget: "string", required: false }
          - { label: "Page Title", name: "pageTitle", widget: "string" }
          - { label: "Intro Text", name: "pageIntro", widget: "text", required: false }
          - { label: "Disable Read More pages", name: "readMoreDisabled", widget: "boolean", default: true, hint: "When on, Read More is off for all posts in this section. Turn off, then enable each post manually inside Read More Page." }
          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Card Title", name: "title", widget: "string", hint: "Title on the Silsila posts grid (card preview)." }
              - { label: "Card Title (English)", name: "titleEn", widget: "string", required: false }
              - { label: "Category Label", name: "categoryLabel", widget: "string", required: false }
              - { label: "Category Label (English)", name: "categoryLabelEn", widget: "string", required: false }
              - { label: "Card Image - first post 900 x 1200 px; other posts 1200 x 800 px", name: "image", widget: "image", required: false, hint: "Use this exact ratio for best fit. First/featured post: 900 x 1200 px portrait. Other posts: 1200 x 800 px landscape. Images with different ratios will be cropped to keep cards level." }
              - { label: "Card Summary", name: "summary", widget: "text", hint: "Short preview text on the card." }
              - { label: "Card Summary (English)", name: "summaryEn", widget: "text", required: false }
              - { label: "Auto Page URL Slug", name: "slug", widget: "hidden", required: false }
              - label: "Enable Read More Page"
                name: "readMoreEnabled"
                widget: "boolean"
                default: false
                required: false
                condition:
                  field: readMoreDisabled
                  value: false
              - label: "Read More Page (full article) — click header to expand/collapse"
                name: "readMore"
                widget: "object"
                collapsed: true
                summary: "{{fields.heading}}"
                required: false
                condition:
                  - field: readMoreDisabled
                    value: false
                  - field: readMoreEnabled
                    value: true
                fields:
                  - { label: "Heading", name: "heading", widget: "string", required: false, hint: "Large title on the Read More page (below header)." }
                  - { label: "Heading Font Size (px)", name: "headingPx", widget: "string", required: false, hint: "Example: 58" }
                  - { label: "Heading (English)", name: "headingEn", widget: "string", required: false }
                  - { label: "Heading Font Size (px) (English)", name: "headingPxEn", widget: "string", required: false, hint: "Example: 58" }
                  - { label: "Quote Under Photo", name: "quote", widget: "text", required: false }
                  - { label: "Quote Under Photo (English)", name: "quoteEn", widget: "text", required: false }
                  - { label: "Quote Source", name: "quoteSource", widget: "string", required: false }
                  - { label: "Quote Source (English)", name: "quoteSourceEn", widget: "string", required: false }
                  - label: "Content Paragraphs (below quote)"
                    name: "body"
                    widget: "list"
                    summary: "{{fields.paragraph}}"
                    required: false
                    field:
                      label: Paragraph
                      name: paragraph
                      widget: markdown
                  - label: "Content Paragraphs (English)"
                    name: "bodyEn"
                    widget: "list"
                    summary: "{{fields.paragraph}}"
                    required: false
                    field:
                      label: Paragraph
                      name: paragraph
                      widget: markdown
      - name: "posts"
        label: "Show More Post Editor"
        file: "data/posts.json"
        format: "json"
        fields:
          - label: "Categories / Filters"
            name: "filters"
            widget: "list"
            required: false
            summary: "{{fields.label}}"
            hint: "These become the filter buttons on the Show more page. 'All' is added automatically by the website, so you only manage the custom categories here."
            fields:
              - { label: "Category Key", name: "key", widget: "string", hint: "Example: updates. Use lowercase English letters, numbers, and hyphens only. No spaces." }
              - { label: "Button Label", name: "label", widget: "string", hint: "Label shown on the filter button in Malayalam." }
              - { label: "Button Label (English)", name: "labelEn", widget: "string", required: false, hint: "Label shown on the filter button in English mode." }
          - { label: "Disable Read More pages", name: "readMoreDisabled", widget: "boolean", default: true, hint: "When on, Read More is off for all posts in this section. Turn off, then enable each post manually inside Read More Page." }

          - label: "Posts"
            name: "posts"
            widget: "list"
            summary: "{{fields.title}}"
            fields:
              - { label: "Card Title", name: "title", widget: "string", hint: "Title on the homepage articles grid." }
              - { label: "Card Title (English)", name: "titleEn", widget: "string", required: false }
              - { label: "Category (filter key)", name: "category", widget: "string", hint: "Must match one Category Key from the Categories / Filters list above. Example: updates" }
              - { label: "Category Label", name: "categoryLabel", widget: "string", required: false, hint: "Malayalam label shown on the card pill" }
              - { label: "Category Label (English)", name: "categoryLabelEn", widget: "string", required: false, hint: "Example: Updates / Teachings / Ramadan" }
              - { label: "Card Image - first post 900 x 1200 px; other posts 1200 x 800 px", name: "image", widget: "image", required: false, hint: "Use this exact ratio for best fit. First/featured post: 900 x 1200 px portrait. Other posts: 1200 x 800 px landscape. Images with different ratios will be cropped to keep cards level." }
              - { label: "Card Summary", name: "summary", widget: "text", hint: "Short preview on the card." }
              - { label: "Card Summary (English)", name: "summaryEn", widget: "text", required: false }
              - { label: "Auto Page URL Slug", name: "slug", widget: "hidden", required: false }
              - label: "Also show on these pages"
                name: "crossPostPages"
                widget: "list"
                required: false
                collapsed: true
                fields:
                  - label: "Page Identifier"
                    name: "pageId"
                    widget: "select"
                    options:
                      - { label: "Usthad", value: "usthad_posts" }
                      - { label: "Mahal", value: "mahal_posts" }
                      - { label: "Silsila", value: "silsila_posts" }
                      - { label: "Learning: Quran", value: "learning_quran_posts" }
                      - { label: "Learning: Hadith", value: "learning_hadith_posts" }
                      - { label: "Learning: Kalima", value: "learning_kalima_posts" }
                      - { label: "Learning: Tasawwuf", value: "learning_tasawwuf_posts" }
                      - { label: "Learning: Padanangal", value: "learning_padanangal_posts" }
                      - { label: "Learning: History", value: "learning_history_posts" }
                      - { label: "Learning: Sufi Stories", value: "learning_sufi_stories_posts" }
                      - { label: "Learning: Videos", value: "learning_videos_posts" }
              - label: "Enable Read More Page"
                name: "readMoreEnabled"
                widget: "boolean"
                default: false
                required: false
                condition:
                  field: readMoreDisabled
                  value: false
              - label: "Read More Page (full article) — click header to expand/collapse"
                name: "readMore"
                widget: "object"
                collapsed: true
                summary: "{{fields.heading}}"
                required: false
                condition:
                  - field: readMoreDisabled
                    value: false
                  - field: readMoreEnabled
                    value: true
                fields:
                  - { label: "Heading", name: "heading", widget: "string", required: false, hint: "Large title on the Read More page." }
                  - { label: "Heading Font Size (px)", name: "headingPx", widget: "string", required: false, hint: "Example: 58" }
                  - { label: "Heading (English)", name: "headingEn", widget: "string", required: false }
                  - { label: "Heading Font Size (px) (English)", name: "headingPxEn", widget: "string", required: false, hint: "Example: 58" }
                  - { label: "Quote Under Photo", name: "quote", widget: "text", required: false }
                  - { label: "Quote Under Photo (English)", name: "quoteEn", widget: "text", required: false }
                  - { label: "Quote Source", name: "quoteSource", widget: "string", required: false }
                  - { label: "Quote Source (English)", name: "quoteSourceEn", widget: "string", required: false }
                  - label: "Content Paragraphs (below quote)"
                    name: "body"
                    widget: "list"
                    summary: "{{fields.paragraph}}"
                    required: false
                    field:
                      label: Paragraph
                      name: paragraph
                      widget: markdown
                  - label: "Content Paragraphs (English)"
                    name: "bodyEn"
                    widget: "list"
                    summary: "{{fields.paragraph}}"
                    required: false
                    field:
                      label: Paragraph
                      name: paragraph
